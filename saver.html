<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screensaver - The Lounge 1698</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap');
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 프로젝터 영상이나 노래방 화면에 완벽히 양보하는 암막 블랙 배경 */
            background-color: #000000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 눈부심을 극도로 억제한 고급 아날로그 시계 프레임 */
        .clock {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: transparent;
            position: relative;
            margin-bottom: 35px;
        }

        /* 시계 바늘 레이아웃 구성 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
        }

        /* 어둠 속에서 은은한 실루엣만 스쳐 지나가도록 불투명도 조절 */
        .hour { width: 4px; height: 85px; background: rgba(255, 255, 255, 0.2); margin-left: -2px; }
        .min { width: 2px; height: 120px; background: rgba(255, 255, 255, 0.15); margin-left: -1px; }
        .sec { width: 1px; height: 140px; background: rgba(226, 183, 71, 0.3); margin-left: -0.5px; } /* 다크 무드 골드 초침 */
        
        .center-dot {
            width: 8px;
            height: 8px;
            background: rgba(226, 183, 71, 0.4);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 명품 호텔 패널 무드의 브랜드 타이틀 디테일 */
        .logo-text {
            font-family: 'Playfair Display', serif;
            color: rgba(255, 255, 255, 0.08); /* 눈이 편안한 최소한의 가독성 8% 유지 */
            font-size: 20px;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

    <div class="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand min" id="min"></div>
        <div class="hand sec" id="sec"></div>
        <div class="center-dot"></div>
    </div>
    <div class="logo-text">The Lounge 1698</div>

    <script>
        function updateClock() {
            const now = new Date();
            const sec = now.getSeconds();
            const min = now.getMinutes();
            const hour = now.getHours();

            const secDeg = sec * 6; 
            const minDeg = min * 6 + sec * 0.1; 
            const hourDeg = (hour % 12) * 30 + min * 0.5;

            document.getElementById('sec').style.transform = `rotate(${secDeg}deg)`;
            document.getElementById('min').style.transform = `rotate(${minDeg}deg)`;
            document.getElementById('hour').style.transform = `rotate(${hourDeg}deg)`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
